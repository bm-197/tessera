appId: dev.tessera.app
productName: Tessera
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/**/*.cjs
# Bundle the Go sidecar. Each CI runner builds it for its own OS/arch into
# electron/bin (Windows produces tessera-sidecar.exe automatically), and the
# whole dir is copied to resources/bin.
extraResources:
  - from: electron/bin
    to: bin

mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.utilities
  icon: build/icon.icns
  artifactName: Tessera-mac-${arch}.${ext}

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png # electron-builder generates the .ico from this
  artifactName: Tessera-win-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Utility
  artifactName: Tessera-linux-${arch}.${ext}

publish:
  provider: github
  owner: bm-197
  repo: tessera
  releaseType: release # publish the release directly (not a draft)
